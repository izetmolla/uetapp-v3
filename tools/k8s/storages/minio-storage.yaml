apiVersion: v1
kind: Namespace
metadata:
  name: storages
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-storage
  namespace: storages
spec:
  replicas: 2
  selector:
    matchLabels:
      app: minio-storage
  template:
    metadata:
      labels:
        app: minio-storage
    spec:
      containers:
        - name: minio-storage
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              value: imolla
            - name: MINIO_ROOT_PASSWORD
              value: grtdrgftretgbtgvrsdgfrtrhfgfg
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          nfs:
            server: 192.168.5.151
            path: /mnt/storages/minio-storage
---
apiVersion: v1
kind: Service
metadata:
  name: minio-storage
  namespace: storages
spec:
  type: ClusterIP
  clusterIP: 10.100.2.201
  selector:
    app: minio-storage
  ports:
    - name: panel
      port: 9001
      targetPort: 9001
    - name: api
      port: 9000
      targetPort: 9000