apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01-issuer-uet
spec:
  acme:
    email: akasaj@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns01-account-uet-edu-al-key
    solvers:
      - dns01:
          cloudflare:
            email: akasaj@gmail.com
            apiTokenSecretRef:
              name: cloudflare-api-token-secret-uet
              key: apiKey
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-uet-edu-al-tls
  namespace: uetedu-v3
spec:
  secretName: app-uet-edu-al-tls
  issuerRef:
    name: letsencrypt-dns01-issuer-uet
    kind: ClusterIssuer
  commonName: app.uet.edu.al
  dnsNames:
    - app.uet.edu.al
# Ingress rules for app.uet.edu.al live in app.yaml alongside uet.izetmolla.com
# (one Ingress resource per path class; nginx rejects duplicate host+path across resources).