apiVersion: v1
kind: Namespace
metadata:
  name: general-registry
  labels:
    # NFS storage is not allowed under restricted; baseline permits NFS + hardened pods.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
# Cloudflare API token: apply registry.secrets.yaml (see registry.secrets.example.yaml).
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01-issuer-izetmolla
spec:
  acme:
    email: izetmolla@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns01-account-izetmolla-key
    solvers:
      - dns01:
          cloudflare:
            email: izetmolla@gmail.com
            apiTokenSecretRef:
              name: cloudflare-api-token-secret-izetmolla
              key: apiKey
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: general-registry-izetmolla-tls
  namespace: default
spec:
  secretName: general-registry-izetmolla-tls
  issuerRef:
    name: letsencrypt-dns01-issuer-izetmolla
    kind: ClusterIssuer
  commonName: rg1.izetmolla.com
  dnsNames:
    - rg1.izetmolla.com

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  namespace: general-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
    spec:
      # nodeSelector:
      #   kubernetes.io/hostname: "k8s-master"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: registry
          image: registry:2
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: "/data"
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
          - mountPath: /data
            name: registry-storage
      volumes:
        - name: registry-storage
          nfs:
            server: 192.168.5.151
            path: /mnt/general-registry
---
apiVersion: v1
kind: Service
metadata:
  name: docker-registry-svc
  namespace: general-registry
spec:
  selector:
    app: docker-registry
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
---

# Basic Authentication Secret (created using htpasswd)
apiVersion: v1
kind: Secret
metadata:
  name: registry-basic-auth
  namespace: general-registry
type: Opaque
data:
  # This should be generated via htpasswd and then base64 encoded.
  auth: aW1vbGxhOiQyeSQwNSROOG1YdlZDeFFnanJOS3dPckdmLkpPNzVtbS9YS1BjdEdDRXBCbTJtbGZMSzM5SDl1bTM1RwoK
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry-ingress
  namespace: general-registry
  annotations:
    nginx.ingress.kubernetes.io/auth-type: "basic"
    nginx.ingress.kubernetes.io/auth-secret: "registry-basic-auth"
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required - rg1.izetmolla.com"
    nginx.ingress.kubernetes.io/proxy-body-size: "800m"

    cert-manager.io/cluster-issuer: letsencrypt-dns01-issuer-izetmolla
    kubernetes.io/tls-acme: "true"
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600s"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600s"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rg1.izetmolla.com
      secretName: general-registry-izetmolla-tls
  rules:
    - host: rg1.izetmolla.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docker-registry-svc
                port:
                  number: 5000