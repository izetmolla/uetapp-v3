# Copy to registry.secrets.yaml, fill in values, then:
#   kubectl apply -f tools/k8s/registry/registry.secrets.yaml
# registry.secrets.yaml is gitignored — never commit real tokens.
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token-secret-izetmolla
  namespace: cert-manager
type: Opaque
stringData:
  apiKey: "<CLOUDFLARE_API_TOKEN>"
