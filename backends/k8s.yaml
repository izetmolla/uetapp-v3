apiVersion: v1
kind: Namespace
metadata:
  name: uetedu-v3
---
# Apply Cloudflare + registry credentials first:
#   cp k8s.secrets.example.yaml k8s.secrets.yaml  # fill in values
#   kubectl apply -f k8s.secrets.yaml
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01-issuer
  namespace: uetedu-v3
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: izet.molla@uet.edu.al
    privateKeySecretRef:
      name: letsencrypt-dns01-account-key
    solvers:
    - dns01:
        cloudflare:
          email: izetmolla@gmail.com
          apiTokenSecretRef:
            name: cloudflare-api-token-secret
            key: apiKey
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: uetedu-v3-certificate
  namespace: uetedu-v3
spec:
  secretName: uetedu-v3-tls
  issuerRef:
    name: letsencrypt-dns01-issuer
    kind: ClusterIssuer
  commonName: uet.izetmolla.com
  dnsNames:
  - uet.izetmolla.com
