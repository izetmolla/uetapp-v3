# Copy to k8s.secrets.yaml, fill in values, then: kubectl apply -f k8s.secrets.yaml
# k8s.secrets.yaml is gitignored — never commit real tokens.
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token-secret
  namespace: cert-manager
type: Opaque
stringData:
  apiKey: "<CLOUDFLARE_API_TOKEN>"
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-01-secret
  namespace: uetedu-v3
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "rg1.izetmolla.com": {
          "auth": "<BASE64_DOCKER_AUTH>"
        }
      }
    }
