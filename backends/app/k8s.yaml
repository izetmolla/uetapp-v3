---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: flowtrove
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      imagePullSecrets:
        - name: registry-01-secret
      containers:
      - name: app
        image: registry-01.flowtrove.com/uetedu/app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
          - name: ENV
            value: "production"
          - name: AUTH_URL
            value: "https://www.flowtrove.com"
          - name: PORT
            value: "3000"
          - name: ADDRESS
            value: "0.0.0.0"
          - name: JWT_SECRET
            value: "tgregftrjcfidughvtriufghenfitvurjngiufvnctriejgnwsfiurjkndrydsgafucrebusdfhwcje"
          - name: DATABASE_URL
            value: "postgres://imolla:gdfsvfdsvfeds8e7y87dy8h8@10.100.100.200:5432/flowtrove_dev"      
          - name: MAIL_URL
            value: smtp://support%40flowtrove.com:Skrapari2252!@smtp.hostinger.com:587      

---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: flowtrove
spec:
  selector:
    app: app
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP